<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa della memoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  height: 100vh;
  width: 100vw;
}

#sidebar {
  position: fixed;
  right: -320px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 15px;
  box-shadow: -10px 0 20px rgba(0,0,0,0.2);
}

#sidebar.open {
  right: 0;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <div id="content"></div>
  <hr>
  <h3>Percorso</h3>
  <div id="routeBox"></div>
</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

const sidebar = document.getElementById("sidebar");
const content = document.getElementById("content");

let data = [];
let route = [];
let markers = [];

/* LOAD JSON */
fetch("./data/punti.json")
  .then(r => r.json())
  .then(d => {
    data = d;
    draw();
  });

/* DRAW MARKERS */
function draw() {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {
    const marker = L.marker([p.lat, p.lng]).addTo(map);

    marker.on("click", () => {
      addToRoute(p);
      open(p);
    });

    markers.push(marker);
  });
}

/* ADD ROUTE */
function addToRoute(p) {
  route.push(p);
  renderRoute();
}

/* SHOW ROUTE ORDER */
function renderRoute() {
  const box = document.getElementById("routeBox");

  box.innerHTML = route.map((p, i) => `
    <div>
      ${i + 1}. ${p.nome}
    </div>
  `).join("");
}

/* OPEN SIDEBAR */
function open(p) {
  sidebar.classList.add("open");

  content.innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>
  `;
}

/* CLOSE ON MAP CLICK */
map.on("click", () => {
  sidebar.classList.remove("open");
});

</script>

</body>
</html>
