<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: system-ui, Arial;
}

/* MAPPA */
#map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* CONTAINER UI TOP */
#topbar {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* SEARCH CENTRATA */
#search {
  width: 360px;
  max-width: 90vw;

  padding: 12px 14px;
  border-radius: 999px;

  border: none;
  outline: none;

  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

/* CATEGORIE */
#cats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.cat {
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  font-size: 13px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.cat:hover {
  background: #f5f5f5;
}

/* SIDEBAR DETTAGLI */
#sidebar {
  position: absolute;
  top: 16px;
  right: -380px;
  width: 340px;
  height: calc(100% - 32px);

  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);

  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  transition: 0.25s;
  z-index: 1000;
  overflow: auto;
}

#sidebar.open {
  right: 16px;
}

#content {
  padding: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- TOP UI -->
<div id="topbar">

  <input id="search" placeholder="🔍 Cerca luogo...">

  <div id="cats">
    <button class="cat" onclick="filter('ALL')">Tutti</button>
    <button class="cat" onclick="filter('Castelli')">🏰 Castelli</button>
    <button class="cat" onclick="filter('Paesi')">🏘️ Paesi</button>
    <button class="cat" onclick="filter('Natura')">🌄 Natura</button>
    <button class="cat" onclick="filter('Storia')">📜 Storia</button>
  </div>

</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];
let currentFilter = "ALL";

/* LOAD */
fetch("./data/punti.json")
.then(r => r.json())
.then(d => {
  data = d;
  render();
  draw();
});

/* DRAW */
function draw(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {

    if(currentFilter !== "ALL" && p.tipo !== currentFilter) return;

    const m = L.marker([p.lat, p.lng]).addTo(map);
    m.on("click", () => open(p));

    markers.push(m);
  });
}

/* FILTER */
function filter(t){
  currentFilter = t;
  render();
  draw();
}

/* LIST (non visibile ma utile per search) */
function render(list = data){

  const filtered = list.filter(p =>
    currentFilter === "ALL" || p.tipo === currentFilter
  );

  // (non usiamo lista visibile, solo filtro logico)
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {

  const v = e.target.value.toLowerCase();

  const filtered = data.filter(p =>
    p.nome.toLowerCase().includes(v)
  );

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  filtered.forEach(p => {
    const m = L.marker([p.lat, p.lng]).addTo(map);
    m.on("click", () => open(p));
    markers.push(m);
  });

});

/* OPEN */
function open(p){
  document.getElementById("sidebar").classList.add("open");

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>
    <p><b>Tipo:</b> ${p.tipo || ""}</p>
  `;
}

</script>

</body>
</html>
