<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
}

/* UI laterale */
#ui {
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow:auto;
}

#search {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

/* categorie */
button.cat {
  width:100%;
  margin:4px 0;
  padding:6px;
  cursor:pointer;
}

/* mappa */
#map {
  flex:1;
}

/* sidebar */
#sidebar {
  position:absolute;
  top:0;
  right:-380px;
  width:360px;
  height:100%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:1000;
  overflow:auto;
}

#sidebar.open {
  right:0;
}

#content {
  padding:10px;
}

button.nav {
  width:100%;
  margin:4px 0;
  padding:6px;
}
</style>
</head>

<body>

<!-- UI -->
<div id="ui">
  <input id="search" placeholder="Cerca luogo...">

  <h4>Categorie</h4>
  <button class="cat" onclick="filter('ALL')">Tutti</button>
  <button class="cat" onclick="filter('Castelli')">🏰 Castelli</button>
  <button class="cat" onclick="filter('Paesi')">🏘️ Paesi</button>
  <button class="cat" onclick="filter('Natura')">🌄 Natura</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6,9.7],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];
let routeControl = null;
let currentFilter = "ALL";

// LOAD JSON
fetch("./data/punti.json")
.then(r=>{
  if(!r.ok) throw new Error("JSON non trovato");
  return r.json();
})
.then(d=>{
  data = d;
  draw();
})
.catch(err=>{
  console.error(err);
});

// DRAW MARKERS
function draw(){

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  data.forEach(p=>{

    if(currentFilter !== "ALL" && p.tipo !== currentFilter) return;

    const m = L.marker([p.lat, p.lng]).addTo(map);

    m.on("click", ()=>open(p));

    markers.push(m);
  });
}

// FILTER
function filter(t){
  currentFilter = t;
  draw();
}

// SIDEBAR
function open(p){

  document.getElementById("sidebar").classList.add("open");

  let nav = "";

  if(p.luoghi && p.luoghi.length){

    nav = p.luoghi.map(l=>`
      <button class="nav" onclick="route(${l.lat},${l.lng})">
        📍 ${l.nome}
      </button>
    `).join("");

  } else {
    nav = `<button class="nav" onclick="route(${p.lat},${p.lng})">📍 Naviga</button>`;
  }

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>

    <h4>🧭 Naviga</h4>
    ${nav}
  `;
}

// ROUTE
function route(lat,lng){

  if(routeControl){
    map.removeControl(routeControl);
  }

  routeControl = L.Routing.control({
    waypoints:[
      L.latLng(map.getCenter()),
      L.latLng(lat,lng)
    ],
    addWaypoints:false,
    draggableWaypoints:false
  }).addTo(map);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{

  const v = e.target.value.toLowerCase();

  if(!v){
    draw();
    return;
  }

  const filtered = data.filter(p=>
    p.nome.toLowerCase().includes(v)
  );

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  filtered.forEach(p=>{
    const m = L.marker([p.lat,p.lng]).addTo(map);
    m.on("click", ()=>open(p));
    markers.push(m);
  });
});

</script>

</body>
</html>
