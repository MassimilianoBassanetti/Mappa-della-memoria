<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa della memoria</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  height: 100vh;
  width: 100vw;
}

#sidebar {
  position: fixed;
  right: -320px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 15px;
  box-shadow: -10px 0 20px rgba(0,0,0,0.2);
}

#sidebar.open {
  right: 0;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <div id="content"></div>
</div>

<script>
const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

const sidebar = document.getElementById("sidebar");
const content = document.getElementById("content");

const data = [
  { nome: "Castello di Rivalta", lat: 44.717, lng: 9.617, storia: "Castello medievale" },
  { nome: "Grazzano Visconti", lat: 44.949, lng: 9.667, storia: "Borgo neomedievale" },
  { nome: "Monte Penice", lat: 44.773, lng: 9.331, storia: "Montagna panoramica" }
];

data.forEach(p => {
  const marker = L.marker([p.lat, p.lng]).addTo(map);

  marker.on("click", () => {
    open(p);
  });
});

function open(p) {
  sidebar.classList.add("open");

  content.innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia}</p>
  `;
}

// chiusura clic fuori
map.on("click", () => {
  sidebar.classList.remove("open");
});
</script>

</body>
</html>
