<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">f
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;e
  font-family: system-ui;
}

/* MAPPA FULLSCREEN */
#map {
  position: absolute;
  inset: 0;
}

/* 🔥 OVERLAY CENTRALE VERA */
#ui {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;

  width: 420px;
}

/* SEARCH */
#search {
  width: 100%;
  padding: 12px 14px;
  border-radius: 999px;
  border: none;
  outline: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* CATEGORIE */
#cats {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
#sidebar{
  position: fixed;
  right: -350px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  transition: 0.25s;
  box-shadow: -10px 0 30px rgba(0,0,0,0.2);
  z-index: 9999;
  padding: 15px;
}

#sidebar.open{
  right: 0;
}
.cat {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  font-size: 13px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* RISULTATI */
#results {
  margin-top: 10px;
  max-height: 200px;
  overflow: auto;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.item:hover {
  background: #f5f5f5;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- UI FLOATING -->
<div id="ui">

  <input id="search" placeholder="🔍 Cerca luogo...">

  <div id="cats">
    <button class="cat" onclick="filter('ALL')">Tutti</button>
    <button class="cat" onclick="filter('Castelli')">🏰 Castelli</button>
    <button class="cat" onclick="filter('Paesi')">🏘️ Paesi</button>
    <button class="cat" onclick="filter('Natura')">🌄 Natura</button>
  </div>

  <div id="results"></div>

</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];
let currentFilter = "ALL";

/* LOAD */
document.getElementById("results").innerHTML="";  
fetch("./data/punti.json")
  .then(r => {
    console.log("STATUS FILE:", r.status);
    return r.json();
  })
  .then(d => {
    console.log("DATA CARICATA:", d);

    data = d;
    renderList(data);
    draw();
  })
  .catch(err => {
    console.error("ERRORE CARICAMENTO JSON:", err);
  });

/* DRAW */
function draw(){

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = data.filter(p =>
    currentFilter === "ALL" || p.tipo === currentFilter
  );

  filtered.forEach(p = >{

    const marker = L.marker([Number(p.lat), Number(p.lng)]).addTo(map);

    marker.on("click", () => open(p));

    markers.push(marker);
  });
}
/* FILTER */
function filter(t){
  currentFilter = t;
 
  draw();
}

/* RENDER LIST */
function renderList(list){

  const container = document.getElementById("results");

  container.innerHTML = "";

  list.forEach(p => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `<b>${p.nome}</b><br><small>${p.tipo || ""}</small>`;

    div.addEventListener("click", () => {
      map.setView([p.lat, p.lng], 13);
      
    });

    container.appendChild(div);
  });
}
/* SEARCH */
document.getElementById("search").addEventListener("input", e => {

  const v = e.target.value.toLowerCase();

  const filtered = data.filter(p =>
    p.nome.toLowerCase().includes(v)
  );

  const container = document.getElementById("results");

  container.innerHTML = "";

  filtered.forEach(p => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${p.nome}</b><br>
      <small>${p.tipo || ""}</small>
    `;

    div.addEventListener("click", () => {
      map.setView([p.lat, p.lng], 13);
      open(p);
    });

    container.appendChild(div);
  });

});
function open(p){
  console.trace("OPEN CHIAMATA");
  const sidebar = document.getElementById("sidebar");
  const content = document.getElementById("content");

  sidebar.classList.add("open");

  content.innerHTML = `
    <h2>${p.nome}</h2>

    <p>${p.storia || "Nessuna descrizione disponibile"}</p>

    ${p.wiki ? `
      <p>
        <a href="${p.wiki}" target="_blank">
          📚 Apri Wikipedia
        </a>
      </p>
    ` : ""}

    ${
      p.luoghi && p.luoghi.length
      ? `
        <hr>
        <h3>📍 Luoghi interni</h3>
        ${p.luoghi.map(l => `
          <div style="padding:6px 0">
            • ${l.nome}
          </div>
        `).join("")}
      `
      : ""
    }
  `;
}
  function render()
  {}
/* GO */
function go(lat,lng){
  map.setView([lat,lng], 13);
}

</script>
<div id="sidebar">
  <div id="content"></div>
</div>
</body>
</html>
