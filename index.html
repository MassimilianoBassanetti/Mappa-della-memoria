<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  margin: 0;
  overflow: hidden;
}

/* MAPPA FULL BACKGROUND */
#map {
  position: absolute;
  inset: 0;
}

/* 🎯 PANNELLO FLOATING CARD (NUOVO LOOK) */
#panel {
  position: absolute;
  top: 50%;
  left: 20px;
  transform: translateY(-50%);
  width: 320px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  overflow: hidden;
  z-index: 1000;
}

/* SEARCH MODERNO */
#search {
  width: 100%;
  padding: 14px;
  border: none;
  outline: none;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

/* LISTA MODERNA */
#list {
  max-height: 420px;
  overflow-y: auto;
}

.item {
  padding: 12px;
  cursor: pointer;
  border-bottom: 1px solid #f2f2f2;
  transition: 0.15s;
}

.item:hover {
  background: #f5f7fa;
}

/* SIDEBAR DETTAGLIO */
#sidebar {
  position: absolute;
  top: 50%;
  right: -380px;
  transform: translateY(-50%);
  width: 340px;
  max-height: 80vh;
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  transition: 0.25s;
  overflow: auto;
  z-index: 1000;
}

#sidebar.open {
  right: 20px;
}

#content {
  padding: 16px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- 🎯 FLOATING PANEL -->
<div id="panel">
  <input id="search" placeholder="🔍 Cerca luogo...">
  <div id="list"></div>
</div>

<!-- 🎯 SIDEBAR -->
<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];

/* LOAD */
fetch("./data/punti.json")
.then(r => r.json())
.then(d => {
  data = d;
  renderList();
  draw();
});

/* DRAW */
function draw(){

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {

    const m = L.marker([p.lat, p.lng]).addTo(map);
    m.on("click", () => open(p));

    markers.push(m);
  });
}

/* LIST */
function renderList(list = data){

  document.getElementById("list").innerHTML =
  list.map(p => `
    <div class="item" onclick="go(${p.lat},${p.lng})">
      <b>${p.nome}</b><br>
      <small>${p.tipo || ""}</small>
    </div>
  `).join("");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {

  const v = e.target.value.toLowerCase();

  const filtered = data.filter(p =>
    p.nome.toLowerCase().includes(v)
  );

  renderList(filtered);
});

/* GO */
function go(lat,lng){
  map.setView([lat,lng], 13);
}

/* OPEN */
function open(p){

  document.getElementById("sidebar").classList.add("open");

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>
  `;
}

</script>

</body>
</html>
