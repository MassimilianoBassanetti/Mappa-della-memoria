<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: system-ui, Arial;
}

/* MAPPA */
#map {
  position: absolute;
  top: 0;
  left: 320px;
  right: 0;
  bottom: 0;
}

/* PANNELLO */
#panel {
  position: absolute;
  top: 20px;
  left: 20px;

  width: 300px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);

  display: flex;
  flex-direction: column;

  overflow: hidden;
  z-index: 1000;
}

/* SEARCH */
#search {
  padding: 10px;
  border: none;
  border-bottom: 1px solid #ddd;
  outline: none;
}

/* CATEGORIE */
#cats {
  display: flex;
  flex-direction: column;
  padding: 8px;
  gap: 6px;
}

.cat {
  padding: 8px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

/* LISTA */
#list {
  max-height: 300px;
  overflow-y: auto;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.item:hover {
  background: #f5f5f5;
}

/* SIDEBAR DETTAGLIO */
#sidebar {
  position: absolute;
  top: 0;
  right: -360px;
  width: 340px;
  height: 100%;
  background: white;
  border-left: 1px solid #ddd;
  transition: 0.2s;
  overflow: auto;
  z-index: 2000;
}

#sidebar.open {
  right: 0;
}

#content {
  padding: 12px;
}
</style>
</head>

<body>

<div id="panel">
  <input id="search" placeholder="🔍 Cerca luogo...">

  <div id="cats">
    <button class="cat" onclick="filter('ALL')">Tutti</button>
    <button class="cat" onclick="filter('Castelli')">🏰 Castelli</button>
    <button class="cat" onclick="filter('Paesi')">🏘️ Paesi</button>
    <button class="cat" onclick="filter('Natura')">🌄 Natura</button>
  </div>

  <div id="list"></div>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];
let currentFilter = "ALL";

/* LOAD */
fetch("./data/punti.json")
.then(r => r.json())
.then(d => {
  data = d;
  renderList();
  draw();
});

/* DRAW MARKERS */
function draw(){

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {

    if(currentFilter !== "ALL" && p.tipo !== currentFilter) return;

    const m = L.marker([p.lat, p.lng]).addTo(map);
    m.on("click", () => open(p));

    markers.push(m);
  });
}

/* FILTER */
function filter(t){
  currentFilter = t;
  renderList();
  draw();
}

/* LISTA */
function renderList(list = data){

  const filtered = list.filter(p =>
    currentFilter === "ALL" || p.tipo === currentFilter
  );

  document.getElementById("list").innerHTML =
    filtered.map(p => `
      <div class="item" onclick="go(${p.lat},${p.lng})">
        <b>${p.nome}</b><br>
        <small>${p.tipo || ""}</small>
      </div>
    `).join("");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {

  const v = e.target.value.toLowerCase();

  const filtered = data.filter(p =>
    p.nome.toLowerCase().includes(v)
  );

  document.getElementById("list").innerHTML =
    filtered.map(p => `
      <div class="item" onclick="go(${p.lat},${p.lng})">
        <b>${p.nome}</b>
      </div>
    `).join("");
});

/* CLICK LIST */
function go(lat,lng){
  map.setView([lat,lng], 13);
}

/* SIDEBAR */
function open(p){

  document.getElementById("sidebar").classList.add("open");

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>
  `;
}

</script>

</body>
</html>
