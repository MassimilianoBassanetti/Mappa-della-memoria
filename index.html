<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body { margin:0; font-family:Arial; }

#map {
  height:100vh;
  width:100vw;
}

/* UI */
#ui {
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  width:260px;
}

#search {
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

#suggestions {
  background:#fff;
  border:1px solid #ddd;
  border-top:none;
  max-height:160px;
  overflow:auto;
}

.sug {
  padding:6px;
  cursor:pointer;
}

.sug:hover {
  background:#eee;
}

/* SIDEBAR */
#sidebar {
  position:absolute;
  top:0;
  right:-380px;
  width:380px;
  height:100%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:2000;
  overflow:auto;
}

#sidebar.open {
  right:0;
}

#content {
  padding:12px;
}

img {
  width:100%;
  border-radius:8px;
  margin-top:8px;
}

button {
  margin:4px 0;
  width:100%;
  padding:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
  <input id="search" placeholder="Cerca luogo...">
  <div id="suggestions"></div>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6,9.7],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let routeControl = null;

// LOAD DATA
fetch("./data/punti.json")
.then(r=>r.json())
.then(d=>{
  data = d;
  draw();
});

// DRAW MARKERS
function draw(){
  data.forEach(p=>{
    const m = L.marker([p.lat,p.lng]).addTo(map);
    m.on("click", ()=>open(p));
  });
}

// SIDEBAR
function open(p){

  document.getElementById("sidebar").classList.add("open");

  let gallery = "";
  if(p.img && p.img.length){
    gallery = `<img src="${p.img[0]}">`;
  }

  let navButtons = "";

  if(p.luoghi && p.luoghi.length){

    navButtons = p.luoghi.map(l=>`
      <button onclick="route(${l.lat},${l.lng})">
        📍 ${l.nome}
      </button>
    `).join("");

  } else {

    navButtons = `
      <button onclick="route(${p.lat},${p.lng})">
        📍 Vai al punto
      </button>
    `;
  }

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>

    <p><b>Tipo:</b> ${p.tipo || ""}</p>

    <p>${p.storia || ""}</p>

    ${gallery}

    ${p.wiki ? `<p><a href="${p.wiki}" target="_blank">Wikipedia</a></p>` : ""}

    <h3>🧭 Naviga</h3>
    ${navButtons}
  `;
}

// CLOSE AUTO
document.addEventListener("click",e=>{
  if(e.target.id === "map"){
    document.getElementById("sidebar").classList.remove("open");
  }
});

// ROUTING
function route(lat,lng){

  if(routeControl){
    map.removeControl(routeControl);
    routeControl = null;
  }

  routeControl = L.Routing.control({
    waypoints:[
      L.latLng(map.getCenter()),
      L.latLng(lat,lng)
    ],
    addWaypoints:false,
    draggableWaypoints:false
  }).addTo(map);
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{

  const val = e.target.value.toLowerCase();
  const sug = document.getElementById("suggestions");

  if(!val){
    sug.innerHTML="";
    return;
  }

  const res = data.filter(p=>p.nome.toLowerCase().includes(val)).slice(0,5);

  sug.innerHTML = res.map(r=>`
    <div class="sug" onclick="go(${r.lat},${r.lng})">
      ${r.nome}
    </div>
  `).join("");
});

function go(lat,lng){
  map.setView([lat,lng],13);
  document.getElementById("suggestions").innerHTML="";
  document.getElementById("search").value="";
}

</script>

</body>
</html>
