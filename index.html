<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mappa Storica</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: system-ui, Arial;
}

/* PANNELLO SINISTRO SICURO */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 320px;
  height: 100%;
  background: white;
  border-right: 1px solid #ddd;

  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 1000;
}

/* SEARCH (SEMPRE VISIBILE) */
#search {
  display: block;
  width: 100%;
  padding: 12px;
  border: none;
  border-bottom: 1px solid #ddd;
  outline: none;
  font-size: 14px;
}

/* CATEGORIE (SEMPRE VISIBILI) */
#cats {
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 6px;
  border-bottom: 1px solid #eee;
}

.cat {
  padding: 10px;
  border: 1px solid #ddd;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

/* LISTA (SCROLLA QUI, NON NASCONDE ALTRO) */
#list {
  flex: 1;
  overflow-y: auto;
}

/* ITEM */
.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.item:hover {
  background: #f5f5f5;
}

/* MAPPA */
#map {
  position: fixed;
  top: 0;
  left: 320px;
  right: 0;
  bottom: 0;
}

/* SIDEBAR DETTAGLIO */
#sidebar {
  position: fixed;
  top: 0;
  right: -360px;
  width: 340px;
  height: 100%;
  background: white;
  border-left: 1px solid #ddd;
  transition: 0.2s;
  z-index: 2000;
  overflow: auto;
}

#sidebar.open {
  right: 0;
}

#content {
  padding: 12px;
}
</style>
</head>

<body>

<!-- PANNELLO -->
<div id="panel">

  <!-- SEARCH -->
  <input id="search" placeholder="🔍 Cerca luogo...">

  <!-- CATEGORIE -->
  <div id="cats">
    <button class="cat" onclick="filter('ALL')">Tutti</button>
    <button class="cat">🏰 Castelli</button>
    <button class="cat">🏘️ Paesi</button>
    <button class="cat">🌄 Natura</button>
  </div>

  <!-- LISTA -->
  <div id="list"></div>

</div>

<!-- MAPPA -->
<div id="map"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="content">Seleziona un punto</div>
</div>

<script>

const map = L.map('map').setView([44.6, 9.7], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let data = [];
let markers = [];
let currentFilter = "ALL";

/* LOAD */
fetch("./data/punti.json")
.then(r => r.json())
.then(d => {
  data = d;
  renderList();
  draw();
});

/* DRAW */
function draw(){

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  data.forEach(p => {
    const m = L.marker([p.lat, p.lng]).addTo(map);
    m.on("click", () => open(p));
    markers.push(m);
  });
}

/* LIST */
function renderList(list = data){

  document.getElementById("list").innerHTML =
    list.map(p => `
      <div class="item" onclick="go(${p.lat},${p.lng})">
        <b>${p.nome}</b><br>
        <small>${p.tipo || ""}</small>
      </div>
    `).join("");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {

  const v = e.target.value.toLowerCase();

  const filtered = data.filter(p =>
    p.nome.toLowerCase().includes(v)
  );

  renderList(filtered);
});

/* GO */
function go(lat,lng){
  map.setView([lat,lng], 13);
}

/* OPEN */
function open(p){

  document.getElementById("sidebar").classList.add("open");

  document.getElementById("content").innerHTML = `
    <h2>${p.nome}</h2>
    <p>${p.storia || ""}</p>
  `;
}

</script>

</body>
</html>
